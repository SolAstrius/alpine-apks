name: Build & Publish APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  ALPINE_BRANCH: v3.23
  REPO_NAME: main
  SIGNING_KEY_NAME: SolAstrius@alpine-apks.rsa

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Zig 0.16 isn't in Alpine 3.23's repos; fetch the upstream static
      # tarball on the runner and stash it in the workspace so the alpine
      # chroot (which bind-mounts $GITHUB_WORKSPACE) can exec it. We pull
      # direct from ziglang.org because mlugg/setup-zig still expects
      # the pre-0.16 `zig-linux-x86_64-*` tarball naming.
      - name: Stage Zig 0.16.0 into workspace
        env:
          ZIG_VERSION: 0.16.0
        run: |
          set -euo pipefail
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$url" | tar -xJ -C "$GITHUB_WORKSPACE"
          mv "$GITHUB_WORKSPACE/zig-x86_64-linux-${ZIG_VERSION}" "$GITHUB_WORKSPACE/.zig"
          "$GITHUB_WORKSPACE/.zig/zig" version

      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ env.ALPINE_BRANCH }}
          packages: alpine-sdk sudo

      - name: Build packages
        shell: alpine.sh {0}
        env:
          CARCH: ${{ matrix.arch }}
          ABUILD_PRIVKEY: ${{ secrets.ABUILD_PRIVKEY }}
        run: |
          set -eu
          export PATH="$GITHUB_WORKSPACE/.zig:$PATH"
          zig version

          # abuild refuses to run as root — set up keys under the runner
          # user's HOME which setup-alpine drops us into.
          install -d -m 700 "$HOME/.abuild"
          printf '%s' "$ABUILD_PRIVKEY" > "$HOME/.abuild/$SIGNING_KEY_NAME"
          chmod 600 "$HOME/.abuild/$SIGNING_KEY_NAME"
          # abuild-sign expects the matching .pub alongside the private key.
          install -m 644 \
            "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" \
            "$HOME/.abuild/$SIGNING_KEY_NAME.pub"
          echo "PACKAGER_PRIVKEY=\"$HOME/.abuild/$SIGNING_KEY_NAME\"" > "$HOME/.abuild/abuild.conf"

          # Also install the public key into /etc/apk/keys so apk accepts
          # the signatures on any subsequent verification step.
          sudo install -D -m 644 \
            "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" \
            "/etc/apk/keys/$SIGNING_KEY_NAME.pub"

          for pkg in main/*/; do
            name=$(basename "$pkg")
            echo "::group::abuild $name ($CARCH)"
            ( cd "$pkg" && CARCH="$CARCH" PATH="$GITHUB_WORKSPACE/.zig:$PATH" abuild -F )
            echo "::endgroup::"
          done

      - name: Collect APKs
        shell: alpine.sh {0}
        env:
          CARCH: ${{ matrix.arch }}
        run: |
          set -eu
          out="$GITHUB_WORKSPACE/out/alpine/$ALPINE_BRANCH/$REPO_NAME/$CARCH"
          mkdir -p "$out"
          # abuild outputs to $HOME/packages/<repo>/<arch>/*.apk where
          # <repo> = parent dir of the APKBUILD's parent — here: "main".
          find "$HOME/packages/$REPO_NAME/$CARCH" -name '*.apk' -exec cp {} "$out/" \;
          ls -la "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.arch }}
          path: out/

  publish:
    name: publish Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ env.ALPINE_BRANCH }}
          packages: alpine-sdk apk-tools sudo

      - name: Stage + sign APKINDEX
        shell: alpine.sh {0}
        env:
          ABUILD_PRIVKEY: ${{ secrets.ABUILD_PRIVKEY }}
        run: |
          set -eu
          install -d -m 700 "$HOME/.abuild"
          printf '%s' "$ABUILD_PRIVKEY" > "$HOME/.abuild/$SIGNING_KEY_NAME"
          chmod 600 "$HOME/.abuild/$SIGNING_KEY_NAME"
          # Debug: fingerprint the loaded privkey's derived pubkey so we
          # can confirm the secret arrived intact (public info, safe to log).
          echo "DEBUG: derived pubkey sha256:"
          openssl rsa -in "$HOME/.abuild/$SIGNING_KEY_NAME" -pubout 2>/dev/null | openssl sha256
          echo "DEBUG: committed pubkey sha256:"
          openssl sha256 "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub"
          # apk index reads input .apks and verifies signatures against
          # keys it trusts — drop ours in before calling it.
          sudo install -D -m 644 \
            "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" \
            "/etc/apk/keys/$SIGNING_KEY_NAME.pub"

          site="$GITHUB_WORKSPACE/site"
          mkdir -p "$site"
          for art in "$GITHUB_WORKSPACE"/artifacts/apks-*/alpine/"$ALPINE_BRANCH"/"$REPO_NAME"/*/; do
            [ -d "$art" ] || continue
            arch=$(basename "$art")
            dest="$site/alpine/$ALPINE_BRANCH/$REPO_NAME/$arch"
            mkdir -p "$dest"
            cp -f "$art"/*.apk "$dest/"
            ( cd "$dest"
              apk index -o APKINDEX.tar.gz.unsigned *.apk
              abuild-sign -k "$HOME/.abuild/$SIGNING_KEY_NAME" APKINDEX.tar.gz.unsigned
              mv APKINDEX.tar.gz.unsigned APKINDEX.tar.gz
            )
          done

          # Publish the public key at a stable URL consumers can curl.
          install -D -m 644 "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" "$site/keys/$SIGNING_KEY_NAME.pub"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
