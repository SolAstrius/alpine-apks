name: Build & Publish APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  ALPINE_BRANCH: v3.23
  REPO_NAME: main
  SIGNING_KEY_NAME: SolAstrius@alpine-apks.rsa

jobs:
  build:
    name: build (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ env.ALPINE_BRANCH }}
          packages: alpine-sdk zig sudo

      - name: Build packages
        shell: alpine.sh {0}
        env:
          CARCH: ${{ matrix.arch }}
          ABUILD_PRIVKEY: ${{ secrets.ABUILD_PRIVKEY }}
        run: |
          set -eu
          # abuild refuses to run as root — set up keys under the runner
          # user's HOME which setup-alpine drops us into.
          install -d -m 700 "$HOME/.abuild"
          printf '%s' "$ABUILD_PRIVKEY" > "$HOME/.abuild/$SIGNING_KEY_NAME"
          chmod 600 "$HOME/.abuild/$SIGNING_KEY_NAME"
          echo "PACKAGER_PRIVKEY=\"$HOME/.abuild/$SIGNING_KEY_NAME\"" > "$HOME/.abuild/abuild.conf"

          # Install the public key into /etc/apk/keys so abuild-sign can
          # reference it when emitting .apk signatures.
          sudo install -D -m 644 \
            "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" \
            "/etc/apk/keys/$SIGNING_KEY_NAME.pub"

          for pkg in main/*/; do
            name=$(basename "$pkg")
            echo "::group::abuild $name ($CARCH)"
            ( cd "$pkg" && CARCH="$CARCH" abuild -F )
            echo "::endgroup::"
          done

      - name: Collect APKs
        shell: alpine.sh {0}
        env:
          CARCH: ${{ matrix.arch }}
        run: |
          set -eu
          out="$GITHUB_WORKSPACE/out/alpine/$ALPINE_BRANCH/$REPO_NAME/$CARCH"
          mkdir -p "$out"
          # abuild outputs to $HOME/packages/<repo>/<arch>/*.apk where
          # <repo> = parent dir of the APKBUILD's parent — here: "main".
          find "$HOME/packages/$REPO_NAME/$CARCH" -name '*.apk' -exec cp {} "$out/" \;
          ls -la "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ matrix.arch }}
          path: out/

  publish:
    name: publish to gh-pages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages
        continue-on-error: true

      - name: Bootstrap gh-pages if missing
        run: |
          set -eu
          if [ ! -d pages/.git ]; then
            rm -rf pages
            mkdir pages
            cd pages
            git init -b gh-pages
            git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ env.ALPINE_BRANCH }}
          packages: alpine-sdk apk-tools sudo

      - name: Merge APKs and regenerate signed APKINDEX
        shell: alpine.sh {0}
        env:
          ABUILD_PRIVKEY: ${{ secrets.ABUILD_PRIVKEY }}
        run: |
          set -eu
          install -d -m 700 "$HOME/.abuild"
          printf '%s' "$ABUILD_PRIVKEY" > "$HOME/.abuild/$SIGNING_KEY_NAME"
          chmod 600 "$HOME/.abuild/$SIGNING_KEY_NAME"

          cd "$GITHUB_WORKSPACE/pages"
          for art in "$GITHUB_WORKSPACE"/artifacts/apks-*/alpine/"$ALPINE_BRANCH"/"$REPO_NAME"/*/; do
            [ -d "$art" ] || continue
            arch=$(basename "$art")
            dest="alpine/$ALPINE_BRANCH/$REPO_NAME/$arch"
            mkdir -p "$dest"
            cp -f "$art"/*.apk "$dest/"
          done

          install -D -m 644 "$GITHUB_WORKSPACE/keys/$SIGNING_KEY_NAME.pub" "keys/$SIGNING_KEY_NAME.pub"

          for d in alpine/"$ALPINE_BRANCH"/"$REPO_NAME"/*/; do
            ( cd "$d"
              apk index -o APKINDEX.tar.gz.unsigned *.apk
              abuild-sign -k "$HOME/.abuild/$SIGNING_KEY_NAME" APKINDEX.tar.gz.unsigned
              mv APKINDEX.tar.gz.unsigned APKINDEX.tar.gz
            )
          done

      - name: Publish
        working-directory: pages
        run: |
          set -eu
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "publish: ${GITHUB_SHA::7} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git remote | grep -q '^origin$' || git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git push -u origin gh-pages
